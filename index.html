<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Life Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c;
  --surface: #111116;
  --surface2: #1a1a22;
  --border: rgba(255,255,255,0.12);
  --border2: rgba(255,255,255,0.22);
  --text: #f0ede6;
  --text-muted: #5a5860;
  --gold: #e2b84e;
  --gold-dim: rgba(226,184,78,0.14);
  --danger: #ff5555;
  --poison-clr: #5ddc5d;
  --rad-clr: #c8e84a;
  --energy-clr: #4ac8e8;
  --storm-clr: #a855f7;
  --exp-clr: #f97316;
  --monarch-clr: #f0c040;
  --initiative-clr: #60a5fa;
  --panel-border: 2px solid rgba(255,255,255,0.18);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 2px solid rgba(255,255,255,0.12);
  background: #0d0d11;
  flex-shrink: 0;
  z-index: 100;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.header-right { display: flex; gap: 8px; align-items: center; }

/* ── Buttons ── */
.btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 7px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Crimson Pro', serif;
  font-size: 15px;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn:hover { background: #26262e; border-color: rgba(255,255,255,0.35); }
.btn:active { transform: scale(0.96); }
.btn-gold { background: var(--gold-dim); border-color: rgba(226,184,78,0.5); color: var(--gold); }
.btn-gold:hover { background: rgba(226,184,78,0.24); }
.btn-danger { background: rgba(255,85,85,0.1); border-color: rgba(255,85,85,0.4); color: var(--danger); }
.btn-danger:hover { background: rgba(255,85,85,0.2); }

/* ── Setup Screen ── */
#setup-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 38px;
  overflow-y: auto;
  padding: 20px;
}
#setup-screen h2 {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.08em;
}
.setup-section { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
.setup-section-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase; }
.setup-options { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 20px 24px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-align: center;
  min-width: 100px;
  flex: 1 1 100px;
  max-width: 130px;
}
.setup-card:hover { border-color: var(--gold); background: var(--gold-dim); }
.setup-card .num { font-family: 'Cinzel', serif; font-size: 40px; color: var(--gold); line-height: 1; }
.setup-card .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; white-space: nowrap; }
.life-options { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.life-opt {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 20px;
  cursor: pointer;
  font-family: 'Cinzel', serif;
  color: var(--text-muted);
  font-size: 16px;
  transition: all 0.15s;
}
.life-opt:hover, .life-opt.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* ── Game Screen ── */
#game-screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
#game-screen.active { display: flex; }
#players-grid { flex: 1; display: grid; overflow: hidden; }

/* ── Grid layouts ── */
.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

.grid-3 .player-panel:last-child { grid-column: span 2; }
.grid-5 .player-panel:nth-child(4) { grid-column: span 1; margin-left: auto; width: 100%; }
.grid-5 .player-panel:nth-child(5) { grid-column: span 1; margin-right: auto; width: 100%; }
.grid-5 .player-panel:nth-child(4), .grid-5 .player-panel:nth-child(5) { grid-column: span 1; }

@media (max-width: 800px) {
  .grid-5, .grid-6 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
  .grid-5 .player-panel:last-child { grid-column: span 2; }
}

/* ── Player Panel ── */
.player-panel {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  outline: 2px solid rgba(255,255,255,0.20);
}
.player-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.player-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #0e0e14;
  z-index: 0;
}

/* Name row */
.player-top {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.player-name {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.70);
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: color 0.15s;
  min-width: 40px;
  text-align: center;
  padding: 6px 10px;
}
.player-name:hover { color: #fff; border-bottom-color: rgba(255,255,255,0.3); }
.player-name-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  font-family: 'Cinzel', serif;
  font-size: 16px;
  letter-spacing: 0.12em;
  text-align: center;
  width: 120px;
  outline: none;
}

/* Color swatch */
.color-swatch {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.40);
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s, border-color 0.15s;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
}
.color-swatch:hover { transform: scale(1.25); border-color: #fff; }

/* Life area */
.life-area {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 10px;
}
/* Life button groups */
.life-btns-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.life-btn {
  border-radius: 40px;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, color 0.1s, transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
  line-height: 1;
  font-family: 'Cinzel', serif;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.life-btn-lg {
  width: 88px;
  height: 52px;
  font-size: 22px;
}
.life-btn-sm {
  width: 72px;
  height: 44px;
  font-size: 18px;
}
.life-btn:hover { background: rgba(255,255,255,0.16); color: #fff; border-color: rgba(255,255,255,0.5); }
.life-btn:active { transform: scale(0.86); }
.life-num-wrap {
  position: relative;
  min-width: 140px;
  text-align: center;
}
.life-num {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  line-height: 1;
  cursor: default;
  transition: color 0.3s;
  display: block;
  color: #ffffff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.life-num.dead { color: var(--danger) !important; opacity: 0.75; }
.life-delta {
  position: absolute;
  top: -46px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 26px;
  font-weight: 600;
  pointer-events: none;
  white-space: nowrap;
}
.delta-pos { animation: floatUp 1.1s ease-out forwards; color: #6dff6d; }
.delta-neg { animation: floatUp 1.1s ease-out forwards; color: var(--danger); }
@keyframes floatUp {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
}

/* Dynamic Life font sizes based on space availability */
[data-players="1"] .life-num { font-size: 200px; }
[data-players="2"] .life-num { font-size: 160px; }
[data-players="3"] .life-num { font-size: 130px; }
[data-players="4"] .life-num { font-size: 120px; }
[data-players="5"] .life-num { font-size: 96px; }
[data-players="6"] .life-num { font-size: 84px; }

[data-players="5"] .life-btn-lg, [data-players="6"] .life-btn-lg { width: 70px; height: 42px; font-size: 18px; }
[data-players="5"] .life-btn-sm, [data-players="6"] .life-btn-sm { width: 58px; height: 36px; font-size: 15px; }
[data-players="5"] .life-num-wrap, [data-players="6"] .life-num-wrap { min-width: 110px; }

/* Sub counters */
.sub-counters {
  position: relative;
  z-index: 2;
  display: flex;
  gap: 14px;
  margin-top: 10px;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 480px;
}
.counter-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.counter-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.40);
  font-family: 'Cinzel', serif;
  white-space: nowrap;
}
.counter-label.clr-poison  { color: rgba(93,220,93,0.85); }
.counter-label.clr-rad     { color: rgba(200,232,74,0.85); }
.counter-label.clr-energy  { color: rgba(74,200,232,0.85); }
.counter-label.clr-storm   { color: rgba(168,85,247,0.85); }
.counter-label.clr-exp     { color: rgba(249,115,22,0.85); }
.counter-label.clr-monarch { color: rgba(240,192,64,0.85); }
.counter-label.clr-initiative { color: rgba(96,165,250,0.85); }

.counter-row { display: flex; align-items: center; gap: 7px; }
.mini-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.20);
  color: rgba(255,255,255,0.55);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, transform 0.1s, color 0.1s;
  line-height: 1;
  font-family: 'Cinzel', serif;
}
.mini-btn:hover { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.45); }
.mini-btn:active { transform: scale(0.82); }
.mini-btn.clr-poison:hover  { background: rgba(93,220,93,0.2);   color: var(--poison-clr);    border-color: var(--poison-clr); }
.mini-btn.clr-rad:hover     { background: rgba(200,232,74,0.2);  color: var(--rad-clr);       border-color: var(--rad-clr); }
.mini-btn.clr-energy:hover  { background: rgba(74,200,232,0.2);  color: var(--energy-clr);    border-color: var(--energy-clr); }
.mini-btn.clr-storm:hover   { background: rgba(168,85,247,0.2);  color: var(--storm-clr);     border-color: var(--storm-clr); }
.mini-btn.clr-exp:hover     { background: rgba(249,115,22,0.2);  color: var(--exp-clr);       border-color: var(--exp-clr); }
.mini-btn.clr-monarch:hover { background: rgba(240,192,64,0.2);  color: var(--monarch-clr);   border-color: var(--monarch-clr); }
.mini-btn.clr-initiative:hover { background: rgba(96,165,250,0.2); color: var(--initiative-clr); border-color: var(--initiative-clr); }

.counter-val {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  min-width: 26px;
  text-align: center;
  color: rgba(255,255,255,0.85);
}
.counter-val.clr-poison  { color: var(--poison-clr); }
.counter-val.clr-rad     { color: var(--rad-clr); }
.counter-val.clr-energy  { color: var(--energy-clr); }
.counter-val.clr-storm   { color: var(--storm-clr); }
.counter-val.clr-exp     { color: var(--exp-clr); }
.counter-val.clr-monarch { color: var(--monarch-clr); }
.counter-val.clr-initiative { color: var(--initiative-clr); }
.counter-val.at-limit    { color: var(--danger); font-weight: 700; }

/* Monarch / Initiative badges */
.badge-counter {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.badge-toggle {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.45);
  font-family: 'Cinzel', serif;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.15s;
  white-space: nowrap;
}
.badge-toggle:hover { background: rgba(255,255,255,0.14); color: #fff; }
.badge-toggle.active-monarch   { background: rgba(240,192,64,0.22); border-color: var(--monarch-clr); color: var(--monarch-clr); }
.badge-toggle.active-initiative { background: rgba(96,165,250,0.22); border-color: var(--initiative-clr); color: var(--initiative-clr); }

/* Commander damage */
.cmd-dmg-section {
  position: relative;
  z-index: 2;
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: 100%;
}
.cmd-dmg-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.30);
  font-family: 'Cinzel', serif;
}
.cmd-dmg-rows { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 10px; }
.cmd-dmg-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.35);
  border-radius: 24px;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.12);
}
.cmd-dmg-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.25);
  flex-shrink: 0;
}
.cmd-dmg-val {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  min-width: 24px;
  text-align: center;
  color: rgba(255,255,255,0.85);
  line-height: 1;
}
.cmd-dmg-val.at-21 { color: var(--danger); font-weight: 700; }
.cmd-mini-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.20);
  color: rgba(255,255,255,0.55);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, transform 0.1s, color 0.1s;
  line-height: 1;
  font-family: 'Cinzel', serif;
}
.cmd-mini-btn:hover { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.45); }
.cmd-mini-btn:active { transform: scale(0.82); }

.cmd-toggle {
  position: relative;
  z-index: 2;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  margin-top: 6px;
  padding: 3px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.10);
  font-family: 'Cinzel', serif;
  transition: color 0.15s, border-color 0.15s;
}
.cmd-toggle:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }

/* Dead overlay */
.dead-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: rgba(0,0,0,0.62);
  display: none;
  align-items: center;
  justify-content: center;
}
.dead-overlay.show { display: flex; }
.dead-overlay-text {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  color: var(--danger);
  letter-spacing: 0.16em;
  text-shadow: 0 0 30px rgba(255,85,85,0.7);
}

/* History bar */
#history-bar {
  border-top: 2px solid rgba(255,255,255,0.12);
  background: #0d0d11;
  padding: 6px 18px;
  font-size: 13px;
  color: var(--text-muted);
  min-height: 32px;
  display: none;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  overflow: hidden;
}
#history-bar.visible { display: flex; }
#history-entries { display: flex; gap: 14px; flex: 1; overflow-x: auto; scrollbar-width: none; }
#history-entries::-webkit-scrollbar { display: none; }
.history-entry { white-space: nowrap; }
.h-pos { color: #6dff6d; }
.h-neg { color: var(--danger); }

/* Modals */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}
.modal-backdrop.open { display: flex; }

/* Global Settings Modal Refined - Clean automatic content scaling without scrollbars */
.settings-modal-box {
  background: #16161e;
  border: 2px solid rgba(255,255,255,0.20);
  border-radius: 18px;
  padding: 24px;
  width: 440px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}
.settings-modal-title {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-align: center;
}
.settings-section-label {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: 'Cinzel', serif;
  margin-bottom: 8px;
  text-align: center;
}
.counter-toggle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.counter-toggle-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all 0.15s;
  gap: 8px;
}
.counter-toggle-item:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.25); }
.counter-toggle-item.enabled { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
.cti-name { font-family: 'Cinzel', serif; font-size: 12px; color: rgba(255,255,255,0.70); letter-spacing: 0.06em; }
.cti-icon { font-size: 16px; flex-shrink: 0; }
.toggle-pill {
  width: 36px;
  height: 20px;
  border-radius: 10px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  position: relative;
  flex-shrink: 0;
  transition: background 0.2s;
}
.toggle-pill::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: left 0.2s, background 0.2s;
}
.counter-toggle-item.enabled .toggle-pill { background: rgba(226,184,78,0.4); border-color: var(--gold); }
.counter-toggle-item.enabled .toggle-pill::after { left: 19px; background: var(--gold); }

.counter-toggle-item.enabled[data-counter="poison"] .toggle-pill { background: rgba(93,220,93,0.3); border-color: var(--poison-clr); }
.counter-toggle-item.enabled[data-counter="poison"] .toggle-pill::after { background: var(--poison-clr); }
.counter-toggle-item.enabled[data-counter="rad"] .toggle-pill { background: rgba(200,232,74,0.3); border-color: var(--rad-clr); }
.counter-toggle-item.enabled[data-counter="rad"] .toggle-pill::after { background: var(--rad-clr); }
.counter-toggle-item.enabled[data-counter="energy"] .toggle-pill { background: rgba(74,200,232,0.3); border-color: var(--energy-clr); }
.counter-toggle-item.enabled[data-counter="energy"] .toggle-pill::after { background: var(--energy-clr); }
.counter-toggle-item.enabled[data-counter="storm"] .toggle-pill { background: rgba(168,85,247,0.3); border-color: var(--storm-clr); }
.counter-toggle-item.enabled[data-counter="storm"] .toggle-pill::after { background: var(--storm-clr); }
.counter-toggle-item.enabled[data-counter="exp"] .toggle-pill { background: rgba(249,115,22,0.3); border-color: var(--exp-clr); }
.counter-toggle-item.enabled[data-counter="exp"] .toggle-pill::after { background: var(--exp-clr); }
.counter-toggle-item.enabled[data-counter="monarch"] .toggle-pill { background: rgba(240,192,64,0.3); border-color: var(--monarch-clr); }
.counter-toggle-item.enabled[data-counter="monarch"] .toggle-pill::after { background: var(--monarch-clr); }
.counter-toggle-item.enabled[data-counter="initiative"] .toggle-pill { background: rgba(96,165,250,0.3); border-color: var(--initiative-clr); }
.counter-toggle-item.enabled[data-counter="initiative"] .toggle-pill::after { background: var(--initiative-clr); }

/* Color picker modal */
.color-modal-box {
  background: #16161e;
  border: 2px solid rgba(255,255,255,0.20);
  border-radius: 18px;
  padding: 26px 24px;
  width: 310px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.color-modal-title {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-align: center;
}
.wheel-wrap { display: flex; justify-content: center; position: relative; }
#color-wheel-canvas { border-radius: 50%; cursor: crosshair; display: block; touch-action: none; }
.slider-row { display: flex; flex-direction: column; gap: 5px; }
.slider-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em; font-family: 'Cinzel', serif; }
.slider-with-val { display: flex; align-items: center; gap: 10px; }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 3px;
  background: rgba(255,255,255,0.15);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  border: 2px solid #fff;
}
input[type=range]::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  border: 2px solid #fff;
}
.slider-val { font-size: 12px; color: rgba(255,255,255,0.55); min-width: 32px; text-align: right; font-family: 'Cinzel', serif; }
.color-preview { height: 44px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.18); transition: background 0.15s; }
.modal-footer { display: flex; gap: 8px; }
.modal-footer .btn { flex: 1; text-align: center; }

/* Dice modal */
.dice-modal-box {
  background: #16161e;
  border: 2px solid rgba(255,255,255,0.20);
  border-radius: 18px;
  padding: 26px;
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.dice-modal-title { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold); letter-spacing: 0.1em; text-align: center; }
.dice-types { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.dice-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Cinzel', serif;
  font-size: 14px;
  padding: 9px 14px;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 54px;
  text-align: center;
}
.dice-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.dice-btn:active { transform: scale(0.92); }
.dice-result-area { display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 80px; justify-content: center; }
.dice-result { font-family: 'Cinzel', serif; font-size: 58px; font-weight: 700; color: var(--gold); line-height: 1; }
.dice-result.rolling { animation: diceRoll 0.38s ease-out; }
@keyframes diceRoll {
  0%   { transform: scale(0.4) rotate(-25deg); opacity: 0.2; }
  65%  { transform: scale(1.18) rotate(6deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.dice-sub { font-size: 14px; color: var(--text-muted); }

/* Life edit modal */
.life-edit-box {
  background: #16161e;
  border: 2px solid rgba(255,255,255,0.20);
  border-radius: 18px;
  padding: 30px 36px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  align-items: center;
  min-width: 240px;
}
.life-edit-title { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text-muted); letter-spacing: 0.12em; }
.life-edit-input {
  font-family: 'Cinzel', serif;
  font-size: 52px;
  font-weight: 700;
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(255,255,255,0.25);
  color: var(--text);
  text-align: center;
  width: 170px;
  outline: none;
}
.life-edit-input:focus { border-bottom-color: var(--gold); }
</style>
</head>
<body>

<header>
  <h1>⚔ MTG Life Tracker</h1>
  <div class="header-right" id="game-header-controls" style="display:none;">
    <button class="btn" id="global-settings-btn">⚙ Settings</button>

</header>

<div id="setup-screen">
  <h2>New Game</h2>
  <div class="setup-section">

  <div class="setup-section">

      <div class="setup-card" data-count="2"><div class="num">2</div><div class="label">Duel</div></div>

</div>

<div id="color-modal" class="modal-backdrop">

    <div class="wheel-wrap">
      <canvas id="color-wheel-canvas" width="220" height="220"></canvas>

    <div class="slider-row">

      <div class="dice-btn" data-sides="2">d2</div>

      <button class="btn btn-gold" id="life-edit-apply" style="flex:1;text-align:center;">Set</button>

</div>

<div id="global-settings-modal" class="modal-backdrop">
  <div class="settings-modal-box">
    <div class="settings-modal-title">Global Match Settings</div>
    <div>
      <div class="settings-section-label">Active Sub-Counters</div>
      <div class="counter-toggle-grid" id="settings-counter-grid"></div>
    </div>
    <div class="modal-footer" style="margin-top:4px;">
      <button class="btn btn-gold" id="settings-close-btn" style="flex:1;text-align:center;">Apply to Match</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   COUNTER DEFINITIONS
═══════════════════════════════════════ */
const COUNTERS = [
  { id:'poison',     label:'Poison',      icon:'☠',  limit:10,  clr:'clr-poison',     badge:false },
  { id:'rad',        label:'Rad',         icon:'☢',  limit:null, clr:'clr-rad',        badge:false },
  { id:'energy',     label:'Energy',      icon:'⚡', limit:null, clr:'clr-energy',     badge:false },
  { id:'storm',      label:'Storm',       icon:'🌩', limit:null, clr:'clr-storm',      badge:false },
  { id:'exp',        label:'Experience',  icon:'✨', limit:null, clr:'clr-exp',        badge:false },
  { id:'monarch',    label:'Monarch',     icon:'👑', limit:null, clr:'clr-monarch',    badge:true  },
  { id:'initiative', label:'Initiative',  icon:'⚔', limit:null, clr:'clr-initiative', badge:true  },
];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const state = {
  playerCount: 0,
  startingLife: 20,
  players: [],
  history: [],
  colorTarget: -1,
  lifeEditTarget: -1,
  
  globalEnabledCounters: {
    poison: false,
    rad: false,
    energy: false,
    storm: false,
    exp: false,
    monarch: false,
    initiative: false
  },
  playerShowCmd: []
};
const DEFAULT_HUES = [0, 210, 130, 45, 280, 175];

function hsl(h,s,l){ return `hsl(${h},${s}%,${l}%)`; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

/* ═══════════════════════════════════════
   SETUP SCREEN INITIALIZATION
═══════════════════════════════════════ */
document.querySelectorAll('.life-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.life-opt').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.startingLife = parseInt(btn.dataset.life);
  });
});
document.querySelectorAll('.setup-card').forEach(card => {
  card.addEventListener('click', () => startGame(parseInt(card.dataset.count)));
});

/* ═══════════════════════════════════════
   START GAME
═══════════════════════════════════════ */
function makeCounters() {
  const c = {};
  COUNTERS.forEach(ct => { c[ct.id] = 0; });
  return c;
}

function startGame(count) {
  state.playerCount = count;
  state.history = [];
  
  COUNTERS.forEach(ct => { state.globalEnabledCounters[ct.id] = false; });
  state.playerShowCmd = Array(count).fill(false);

  state.players = Array.from({length:count},(_,i)=>({
    name: `Player ${i+1}`,
    life: state.startingLife,
    counters: makeCounters(),
    cmdDmg: Array(count).fill(0),
    color: {h:DEFAULT_HUES[i] !== undefined ? DEFAULT_HUES[i] : Math.floor(Math.random() * 360), s:80, l:55},
    opacity: 30,
  }));
  
  document.getElementById('setup-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.classList.add('active');
  document.getElementById('game-header-controls').style.display = 'flex';
  document.getElementById('history-bar').classList.remove('visible');
  renderGrid();
  attachGlobalModalEvents();
}

/* ═══════════════════════════════════════
   RENDER GRID
═══════════════════════════════════════ */
function renderGrid() {
  const grid = document.getElementById('players-grid');
  const n = state.playerCount;
  grid.className = `grid-${n}`;
  grid.setAttribute('data-players', n);
  grid.innerHTML = '';
  state.players.forEach((_,i) => {
    const panel = document.createElement('div');
    panel.className = 'player-panel';
    panel.id = `panel-${i}`;
    panel.innerHTML = buildPanelHTML(i);
    grid.appendChild(panel);
    applyColor(i);
    attachPanelEvents(panel, i);
  });
}

function buildPanelHTML(i) {
  const p = state.players[i];
  const dead = p.life <= 0;
  const isCmdVisible = state.playerShowCmd[i];

  let cmdHTML = '';
  if (isCmdVisible) {
    const rows = state.players.map((op,j) => {
      if (j===i) return '';
      const dot = hsl(op.color.h, op.color.s, op.color.l);
      const cls = p.cmdDmg[j] >= 21 ? ' at-21' : '';
      return `<div class="cmd-dmg-row">
        <div class="cmd-dmg-dot" style="background:${dot}"></div>
        <div class="cmd-mini-btn" data-panel-cmd="${i}" data-from="${j}" data-dir="-1">−</div>
        <div class="cmd-dmg-val${cls}" id="cmdval-${i}-${j}">${p.cmdDmg[j]}</div>
        <div class="cmd-mini-btn" data-panel-cmd="${i}" data-from="${j}" data-dir="1">+</div>
      </div>`;
    }).join('');
    cmdHTML = `<div class="cmd-dmg-section" id="cmd-section-${i}">
      <div class="cmd-dmg-label">Commander damage from</div>
      <div class="cmd-dmg-rows">${rows}</div>
    </div>`;
  }

  const cmdToggleEl = `<div class="cmd-toggle" id="cmd-toggle-${i}" data-player="${i}">${isCmdVisible ? '▾ Commander dmg' : '▸ Commander dmg'}</div>`;

  let subHTML = '';
  COUNTERS.forEach(ct => {
    if (!state.globalEnabledCounters[ct.id]) return;
    const val = p.counters[ct.id];
    const atLimit = ct.limit && val >= ct.limit;

    if (ct.badge) {
      const activeClass = val ? `active-${ct.id}` : '';
      subHTML += `<div class="badge-counter">
        <div class="counter-label ${ct.clr}">${ct.icon} ${ct.label}</div>
        <div class="badge-toggle ${activeClass}" data-panel-badge="${ct.id}" data-player="${i}">${val ? 'Active' : 'Inactive'}</div>
      </div>`;
    } else {
      subHTML += `<div class="counter-group">
        <div class="counter-label ${ct.clr}">${ct.icon} ${ct.label}</div>
        <div class="counter-row">
          <div class="mini-btn ${ct.clr}" data-panel-counter="${ct.id}" data-player="${i}" data-dir="-1">−</div>
          <div class="counter-val ${ct.clr}${atLimit?' at-limit':''}" id="ctr-${ct.id}-${i}">${val}</div>
          <div class="mini-btn ${ct.clr}" data-panel-counter="${ct.id}" data-player="${i}" data-dir="1">+</div>
        </div>
      </div>`;
    }
  });

  const hasAnySub = COUNTERS.some(ct => state.globalEnabledCounters[ct.id]);

  return `
    <div class="player-bg" id="bg-${i}"></div>
    <div class="player-top">
      <div class="color-swatch" id="swatch-${i}"></div>
      <div class="player-name" id="name-display-${i}" data-player="${i}">${p.name}</div>
    </div>
    <div class="life-area">
      <div class="life-btns-group">
        <div class="life-btn life-btn-sm" data-player="${i}" data-dir="-1">−1</div>
        <div class="life-btn life-btn-lg" data-player="${i}" data-dir="-10">−10</div>
      </div>
      <div class="life-num-wrap">
        <span class="life-num${dead?' dead':''}" id="life-${i}" data-player="${i}">${p.life}</span>
        <div class="life-delta" id="delta-${i}"></div>
      </div>
      <div class="life-btns-group">
        <div class="life-btn life-btn-sm" data-player="${i}" data-dir="1">+1</div>
        <div class="life-btn life-btn-lg" data-player="${i}" data-dir="10">+10</div>
      </div>
    </div>
    ${hasAnySub ? `<div class="sub-counters">${subHTML}</div>` : ''}
    ${cmdToggleEl}
    ${cmdHTML}
    <div class="dead-overlay${dead?' show':''}" id="dead-${i}">
      <div class="dead-overlay-text">ELIMINATED</div>
    </div>
  `;
}

/* ═══════════════════════════════════════
   APPLY PLAYER COLOR
═══════════════════════════════════════ */
function applyColor(i) {
  const p = state.players[i];
  const {h,s,l} = p.color;
  const bg = document.getElementById(`bg-${i}`);
  const sw = document.getElementById(`swatch-${i}`);
  if (!bg||!sw) return;
  bg.style.background = `radial-gradient(ellipse 80% 80% at 50% 50%, ${hsl(h,s,l)} 0%, ${hsl(h,s,Math.max(10,l-25))} 40%, transparent 100%)`;
  bg.style.opacity = p.opacity / 100;
  bg.style.zIndex = 1;
  sw.style.background = hsl(h,s,l);
  sw.style.boxShadow = `0 0 8px 1px ${hsl(h,s,l)}88`;
}

/* ═══════════════════════════════════════
   PANEL LEVEL LOCAL EVENT BINDING
═══════════════════════════════════════ */
function attachPanelEvents(panelEl, i) {
  panelEl.querySelectorAll('.life-btn').forEach(btn => {
    btn.onclick = () => changeLife(i, parseInt(btn.dataset.dir));
  });

  panelEl.querySelectorAll('.life-num').forEach(el => {
    el.ondblclick = () => openLifeEdit(i);
  });

  panelEl.querySelectorAll('[data-panel-counter]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute('data-panel-counter');
      const dir = parseInt(btn.dataset.dir);
      const p = state.players[i];
      const ct = COUNTERS.find(c=>c.id===id);
      p.counters[id] = clamp(p.counters[id]+dir, 0, 99);
      
      const el = document.getElementById(`ctr-${id}-${i}`);
      if (el) {
        el.textContent = p.counters[id];
        el.classList.toggle('at-limit', !!(ct.limit && p.counters[id]>=ct.limit));
      }
      
      pushHistory(`${p.name}: ${ct.icon} ${ct.label} → ${p.counters[id]}`);
    };
  });

  panelEl.querySelectorAll('[data-panel-badge]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute('data-panel-badge');
      const p = state.players[i];
      p.counters[id] = p.counters[id] ? 0 : 1;
      const activeClass = `active-${id}`;
      btn.classList.toggle(activeClass, !!p.counters[id]);
      btn.textContent = p.counters[id] ? 'Active' : 'Inactive';
      pushHistory(`${p.name}: ${id} ${p.counters[id] ? 'gained' : 'lost'}`);
    };
  });

  panelEl.querySelectorAll('[data-panel-cmd]').forEach(btn => {
    btn.onclick = () => {
      const from=parseInt(btn.getAttribute('data-from')), dir=parseInt(btn.getAttribute('data-dir'));
      const p=state.players[i], fromP=state.players[from];
      const oldDmg = p.cmdDmg[from];
      p.cmdDmg[from] = clamp(p.cmdDmg[from]+dir, 0, 99);
      const actualChange = p.cmdDmg[from] - oldDmg;
      const el=document.getElementById(`cmdval-${i}-${from}`);
      if (el) { el.textContent=p.cmdDmg[from]; el.classList.toggle('at-21', p.cmdDmg[from]>=21); }
      if (actualChange !== 0) changeLife(i, actualChange * -1);
      pushHistory(`${p.name}: cmd from ${fromP.name} = ${p.cmdDmg[from]}`);
    };
  });

  const toggleBtn = panelEl.querySelector(`#cmd-toggle-${i}`);
  if (toggleBtn) {
    toggleBtn.onclick = () => {
      state.playerShowCmd[i] = !state.playerShowCmd[i];
      rebuildSinglePanel(i);
    };
  }

  const nameDisplay = panelEl.querySelector(`#name-display-${i}`);
  if (nameDisplay) {
    nameDisplay.onclick = () => startNameEdit(i);
  }

  const swatch = panelEl.querySelector(`#swatch-${i}`);
  if (swatch) {
    swatch.onclick = () => openColorModal(i);
  }
}

function rebuildSinglePanel(i) {
  const panel = document.getElementById(`panel-${i}`);
  if (panel) {
    panel.innerHTML = buildPanelHTML(i);
    applyColor(i);
    attachPanelEvents(panel, i);
  }
}

function rebuildAllPanels() {
  state.players.forEach((_, i) => {
    rebuildSinglePanel(i);
  });
}

/* ═══════════════════════════════════════
   LIFE CHANGE MANAGEMENT
═══════════════════════════════════════ */
const deltaTimers = {};
function changeLife(i, delta) {
  const p=state.players[i];
  const prev=p.life;
  p.life=clamp(p.life+delta,-999,9999);
  const el=document.getElementById(`life-${i}`);
  const dead=document.getElementById(`dead-${i}`);
  if (el) { el.textContent=p.life; el.classList.toggle('dead',p.life<=0); }
  if (dead) dead.classList.toggle('show', p.life<=0);
  const diff=p.life-prev;
  if (diff!==0) {
    showDelta(i,diff);
    const sign=diff>0?'+':'';
    pushHistory(`${p.name}: <span class="${diff>0?'h-pos':'h-neg'}">${sign}${diff}</span> → ${p.life}`);
  }
}

function showDelta(i,diff) {
  const el=document.getElementById(`delta-${i}`);
  if (!el) return;
  clearTimeout(deltaTimers[i]);
  el.className='life-delta';
  el.textContent='';
  void el.offsetWidth;
  el.textContent=(diff>0?'+':'')+diff;
  el.classList.add(diff>0?'delta-pos':'delta-neg');
  deltaTimers[i]=setTimeout(()=>{
    if(el){ el.className='life-delta'; el.textContent=''; }
  },1100);
}

/* ═══════════════════════════════════════
   NAME EDIT
═══════════════════════════════════════ */
function startNameEdit(i) {
  const display=document.getElementById(`name-display-${i}`);
  if (!display) return;
  const inp=document.createElement('input');
  inp.className='player-name-input';
  inp.type='text';
  inp.value=state.players[i].name;
  inp.maxLength=20;
  display.replaceWith(inp);
  inp.focus(); inp.select();
  const commit=()=>{
    const val=inp.value.trim()||`Player ${i+1}`;
    state.players[i].name=val;
    const newEl=document.createElement('div');
    newEl.className='player-name'; newEl.id=`name-display-${i}`; newEl.dataset.player=i;
    newEl.textContent=val;
    inp.replaceWith(newEl);
    newEl.onclick = () => startNameEdit(i);
  };
  inp.onblur = commit;
  inp.onkeydown = e => { if(e.key==='Enter') inp.blur(); };
}

/* ═══════════════════════════════════════
   LIFE EDIT MODAL
═══════════════════════════════════════ */
function openLifeEdit(i) {
  state.lifeEditTarget=i;
  document.getElementById('life-edit-input').value=state.players[i].life;
  document.getElementById('life-edit-modal').classList.add('open');
  setTimeout(()=>{ const inp=document.getElementById('life-edit-input'); inp.focus(); inp.select(); },50);
}

/* ═══════════════════════════════════════
   GLOBAL SETTINGS MODAL
═══════════════════════════════════════ */
function openGlobalSettings() {
  const grid = document.getElementById('settings-counter-grid');
  grid.innerHTML = COUNTERS.map(ct => {
    const enabled = state.globalEnabledCounters[ct.id];
    return `<div class="counter-toggle-item${enabled?' enabled':''}" data-setting-counter="${ct.id}">
      <span class="cti-icon">${ct.icon}</span>
      <span class="cti-name">${ct.label}</span>
      <div class="toggle-pill"></div>
    </div>`;
  }).join('');

  grid.querySelectorAll('[data-setting-counter]').forEach(item => {
    item.onclick = () => {
      const id = item.getAttribute('data-setting-counter');
      state.globalEnabledCounters[id] = !state.globalEnabledCounters[id];
      item.classList.toggle('enabled', state.globalEnabledCounters[id]);
    };
  });

  document.getElementById('global-settings-modal').classList.add('open');
}

document.getElementById('settings-close-btn').addEventListener('click', () => {
  document.getElementById('global-settings-modal').classList.remove('open');
  rebuildAllPanels();
});

/* ═══════════════════════════════════════
   COLOR PICKER
═══════════════════════════════════════ */
let pickerH=0, pickerS=80, pickerL=55, pickerOp=30;

function openColorModal(i) {
  state.colorTarget=i;
  const p=state.players[i];
  pickerH=p.color.h; pickerS=p.color.s; pickerL=p.color.l; pickerOp=p.opacity;
  document.getElementById('saturation-slider').value=pickerS;
  document.getElementById('lightness-slider').value=pickerL;
  document.getElementById('opacity-slider').value=pickerOp;
  document.getElementById('saturation-val').textContent=pickerS+'%';
  document.getElementById('lightness-val').textContent=pickerL+'%';
  document.getElementById('opacity-val').textContent=pickerOp+'%';
  drawWheel();
  updatePreview();
  document.getElementById('color-modal').classList.add('open');
}

function drawWheel() {
  const canvas=document.getElementById('color-wheel-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2;
  const outerR=cx-4;
  const innerR=outerR*0.38;
  ctx.clearRect(0,0,W,H);
  for (let deg=0; deg<360; deg++) {
    const a0=(deg-0.5)*Math.PI/180;
    const a1=(deg+0.5)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(cx+outerR*Math.cos(a0), cy+outerR*Math.sin(a0));
    ctx.arc(cx,cy,outerR,a0,a1);
    ctx.arc(cx,cy,innerR,a1,a0,true);
    ctx.closePath();
    ctx.fillStyle=`hsl(${deg},${pickerS}%,${pickerL}%)`;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(cx,cy,innerR-2,0,Math.PI*2);
  ctx.fillStyle=hsl(pickerH,pickerS,pickerL);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.font=`bold 11px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(`${pickerH}°`,cx,cy);
  const dotR=(outerR+innerR)/2;
  const rad=pickerH*Math.PI/180;
  ctx.beginPath();
  ctx.arc(cx+dotR*Math.cos(rad), cy+dotR*Math.sin(rad), 9, 0, Math.PI*2);
  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=2.5;
  ctx.stroke();
  ctx.fillStyle=hsl(pickerH,pickerS,pickerL);
  ctx.fill();
}

function updatePreview() {
  document.getElementById('color-preview').style.background=
    `linear-gradient(135deg, ${hsl(pickerH,pickerS,pickerL)}, ${hsl(pickerH,pickerS,Math.max(10,pickerL-20))})`;
}

function wheelEventToHue(e, canvas) {
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  const cx=canvas.width/2, cy=canvas.height/2;
  const x=(e.clientX-rect.left)*scaleX-cx;
  const y=(e.clientY-rect.top)*scaleY-cy;
  if (Math.sqrt(x*x+y*y)<4) return null;
  return Math.round(((Math.atan2(y,x)*180/Math.PI)+360)%360);
}

let wheelDragging=false;
const wheelCanvas=document.getElementById('color-wheel-canvas');
wheelCanvas.addEventListener('mousedown', e=>{
  const h=wheelEventToHue(e,wheelCanvas);
  if (h!==null) { pickerH=h; drawWheel(); updatePreview(); wheelDragging=true; }
});
document.addEventListener('mousemove', e=>{
  if (!wheelDragging) return;
  const h=wheelEventToHue(e,wheelCanvas);
  if (h!==null) { pickerH=h; drawWheel(); updatePreview(); }
});
document.addEventListener('mouseup', ()=>{ wheelDragging=false; });
wheelCanvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0];
  const h=wheelEventToHue({clientX:t.clientX,clientY:t.clientY},wheelCanvas);
  if (h!==null) { pickerH=h; drawWheel(); updatePreview(); }
},{passive:false});
wheelCanvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=e.touches[0];
  const h=wheelEventToHue({clientX:t.clientX,clientY:t.clientY},wheelCanvas);
  if (h!==null) { pickerH=h; drawWheel(); updatePreview(); }
},{passive:false});

/* ═══════════════════════════════════════
   GLOBAL MODAL BACKDROPS & CONTROLS
═══════════════════════════════════════ */
function attachGlobalModalEvents() {
  document.getElementById('global-settings-btn').onclick = openGlobalSettings;

  document.getElementById('life-edit-cancel').onclick = () => document.getElementById('life-edit-modal').classList.remove('open');
  document.getElementById('life-edit-apply').onclick = applyLifeEdit;
  document.getElementById('life-edit-input').onkeydown = e => {
    if (e.key==='Enter') applyLifeEdit();
    if (e.key==='Escape') document.getElementById('life-edit-modal').classList.remove('open');
  };

  ['saturation','lightness','opacity'].forEach(name=>{
    document.getElementById(`${name}-slider`).oninput = function() {
      const v=parseInt(this.value);
      document.getElementById(`${name}-val`).textContent=v+'%';
      if (name==='saturation') pickerS=v;
      if (name==='lightness')  pickerL=v;
      if (name==='opacity')    pickerOp=v;
      drawWheel(); updatePreview();
    };
  });

  document.getElementById('color-apply-btn').onclick = () => {
    const i=state.colorTarget;
    if (i>=0) {
      state.players[i].color={h:pickerH,s:pickerS,l:pickerL};
      state.players[i].opacity=pickerOp;
      applyColor(i);
      rebuildAllPanels();
    }
    document.getElementById('color-modal').classList.remove('open');
  };
  document.getElementById('color-cancel-btn').onclick = () => document.getElementById('color-modal').classList.remove('open');

  document.getElementById('dice-open-btn').onclick = () => document.getElementById('dice-modal').classList.add('open');
  document.getElementById('dice-close-btn').onclick = () => document.getElementById('dice-modal').classList.remove('open');
  
  document.querySelectorAll('.dice-btn').forEach(btn=>{
    btn.onclick = () => {
      const sides=parseInt(btn.dataset.sides);
      const result=Math.floor(Math.random()*sides)+1;
      const el=document.getElementById('dice-result');
      el.classList.remove('rolling'); void el.offsetWidth; el.classList.add('rolling');
      el.textContent=result;
      document.getElementById('dice-sub').textContent=`d${sides}  ${result===sides?'🎯 Maximum!':result===1?'💀 Minimum':''}`;
      pushHistory(`🎲 d${sides} → <strong>${result}</strong>`);
    };
  });

  document.getElementById('history-toggle-btn').onclick = () => {
    const bar=document.getElementById('history-bar');
    bar.classList.toggle('visible');
    if (bar.classList.contains('visible')) renderHistory();
  };

  ['color-modal','dice-modal','life-edit-modal', 'global-settings-modal'].forEach(id=>{
    document.getElementById(id).onclick = e => { if(e.target.id===id) document.getElementById(id).classList.remove('open'); };
  });
}

function applyLifeEdit() {
  const i=state.lifeEditTarget;
  const val=parseInt(document.getElementById('life-edit-input').value);
  if (!isNaN(val)&&i>=0) {
    const prev=state.players[i].life;
    state.players[i].life=clamp(val,-999,9999);
    const el=document.getElementById(`life-${i}`);
    const dead=document.getElementById(`dead-${i}`);
    if (el) { el.textContent=val; el.classList.toggle('dead',val<=0); }
    if (dead) dead.classList.toggle('show',val<=0);
    const diff=val-prev;
    if (diff!==0) {
      showDelta(i,diff);
      pushHistory(`${state.players[i].name}: set to ${val} (${diff>0?'+':''}${diff})`);
    }
  }
  document.getElementById('life-edit-modal').classList.remove('open');
}

/* ═══════════════════════════════════════
   HISTORY LOGIC
═══════════════════════════════════════ */
function pushHistory(msg) {
  state.history.unshift(msg);
  if (state.history.length>80) state.history.pop();
  renderHistory();
}
function renderHistory() {
  const bar=document.getElementById('history-bar');
  if (!bar.classList.contains('visible')) return;
  document.getElementById('history-entries').innerHTML=
    state.history.slice(0,25).map(e=>`<span class="history-entry">${e}</span>`).join('');
}

/* ═══════════════════════════════════════
   REMATCH (keep names & colors, reset game state)
═══════════════════════════════════════ */
document.getElementById('rematch-btn').addEventListener('click', () => {
  if (!state.players.length) return;

  // Reset each player's game state, preserving name and color
  state.players.forEach((p, i) => {
    p.life = state.startingLife;
    p.counters = makeCounters();
    p.cmdDmg = Array(state.playerCount).fill(0);
  });

  // Reset match-level state
  state.history = [];
  state.playerShowCmd = Array(state.playerCount).fill(false);
  COUNTERS.forEach(ct => { state.globalEnabledCounters[ct.id] = false; });

  document.getElementById('history-bar').classList.remove('visible');
  renderGrid();

  // Brief flash to confirm reset
  const btn = document.getElementById('rematch-btn');
  btn.textContent = '✓ Reset!';
  setTimeout(() => { btn.textContent = '↺ Rematch'; }, 1200);
});

/* ═══════════════════════════════════════
   RESET APP STATE
═══════════════════════════════════════ */
document.getElementById('reset-btn').addEventListener('click',()=>{
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('game-header-controls').style.display='none';
  document.getElementById('history-bar').classList.remove('visible');
  document.getElementById('setup-screen').style.display='';
  document.getElementById('players-grid').innerHTML='';
  state.players=[]; state.history=[];
});
</script>
